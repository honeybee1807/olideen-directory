<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business — Olideen Directory</title>
  <meta name="description" content="Local business listing on the Olideen Directory." />
  <meta name="robots" content="index, follow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
<div class="page-wrap">

  <div id="nav-placeholder"></div>

  <nav class="breadcrumb" aria-label="Breadcrumb" id="breadcrumbNav">
    <div class="breadcrumb-inner">
      <a href="index.html">Directory</a>
      <span class="sep">›</span>
      <span class="current" id="bcBiz">Loading…</span>
    </div>
  </nav>

  <main class="detail-wrap" id="detailWrap" role="main">
    <div style="text-align:center;padding:5rem;">
      <div class="spinner"></div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
</div>
<div id="modal-placeholder"></div>

<script>
let currentBiz = null;

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('nav-placeholder').innerHTML    = renderNav('');
  document.getElementById('footer-placeholder').innerHTML = renderFooter();
  document.getElementById('modal-placeholder').innerHTML  = renderModal();

  const params = new URLSearchParams(window.location.search);
  const id     = params.get('id');
  if (!id) { renderNotFound(); return; }
  loadBusiness(id);
});

async function loadBusiness(id) {
  try {
    currentBiz = await fetchById(id);
    if (!currentBiz) { renderNotFound(); return; }
    renderBusiness();
    loadRelated();
  } catch(e) {
    console.error(e);
    renderNotFound();
  }
}

function renderBusiness() {
  const b = currentBiz;
  const town = normaliseTown(b.town);

  /* ── SEO meta ────────────────────────────────────────────────── */
  const title = `${b.name} — ${b.category} in ${town} | Olideen Directory`;
  const desc  = b.description
    ? `${b.description} — Find ${b.name} on the Olideen Directory. ${b.category} business based in ${town}, KwaZulu-Natal.`
    : `${b.name} is a ${b.category} business in ${town}, KwaZulu-Natal. Find contact details and links on the Olideen Directory.`;

  setMeta(title, desc, `https://directory.olideentech.co.za/business.html?id=${b.id}`);
  setMetaTag('property','og:title',       title);
  setMetaTag('property','og:description', desc);
  setMetaTag('property','og:type',        'business.business');

  /* ── LocalBusiness schema ────────────────────────────────────── */
  injectSchema(buildLocalBusinessSchema(b));

  /* ── Breadcrumb ──────────────────────────────────────────────── */
  document.getElementById('breadcrumbNav').innerHTML = `
    <div class="breadcrumb-inner">
      <a href="index.html">Directory</a>
      <span class="sep">›</span>
      <a href="town.html?t=${encodeURIComponent(b.town)}">${escHtml(town)}</a>
      <span class="sep">›</span>
      <span class="current">${escHtml(b.name)}</span>
    </div>`;

  /* ── Main card ───────────────────────────────────────────────── */
  document.getElementById('detailWrap').innerHTML = `
    <div class="detail-card anim">
      <div class="detail-accent"></div>
      <div class="detail-body">
        <div class="detail-head">
          <div class="detail-initial">${initial(b.name)}</div>
          <div>
            <h1 class="detail-name">${escHtml(b.name)}</h1>
            <div class="detail-meta">
              <span class="cat-pill ${catClass(b.category)}">${escHtml(b.category)}</span>
              <a href="town.html?t=${encodeURIComponent(b.town)}"
                 style="font-size:0.78rem;color:var(--muted);font-family:var(--font-mono);">
                📍 ${escHtml(town)}
              </a>
            </div>
          </div>
        </div>

        ${b.description ? `<p class="detail-desc">${escHtml(b.description)}</p>` : ''}

        <div class="detail-links">
          ${b.whatsapp
            ? `<a href="${waLink(b.whatsapp)}" target="_blank" rel="noopener" class="link-btn wa" aria-label="Contact ${escHtml(b.name)} on WhatsApp">
                 💬 Chat on WhatsApp
               </a>`
            : ''}
          ${b.website
            ? `<a href="${escHtml(b.website)}" target="_blank" rel="noopener" class="link-btn web" aria-label="Visit ${escHtml(b.name)} website">
                 ↗ Visit Website
               </a>`
            : ''}
          ${!b.whatsapp && !b.website ? '<p style="color:var(--muted);font-size:0.83rem;">No contact links listed yet.</p>' : ''}
        </div>

        <!-- SEO-rich descriptive text, always rendered as real HTML -->
        <div class="detail-seo-text">
          <h2>About ${escHtml(b.name)}</h2>
          <p>
            ${escHtml(b.name)} is a local ${escHtml(b.category.toLowerCase())} business based in
            ${escHtml(town)}, KwaZulu-Natal. Listed on the Olideen Directory — a free local business
            directory connecting customers to businesses across KZN.
          </p>
          <p>
            ${b.description
              ? `${escHtml(b.description)} `
              : ''}
            ${b.whatsapp
              ? `You can reach ${escHtml(b.name)} directly on WhatsApp. `
              : ''}
            ${b.website
              ? `Visit their website for more information. `
              : ''}
          </p>
          <p>
            Looking for more ${escHtml(b.category.toLowerCase())} businesses in ${escHtml(town)}?
            <a href="town.html?t=${encodeURIComponent(b.town)}" style="color:var(--gold);">
              See all businesses in ${escHtml(town)} →
            </a>
          </p>
        </div>
      </div>
    </div>

    <!-- Related businesses injected below -->
    <div class="related-section" id="relatedSection">
      <div style="text-align:center;padding:2rem;"><div class="spinner"></div></div>
    </div>

    <!-- CTA to list -->
    <div style="margin-top:2rem;padding:2rem;background:var(--gold-pale);border:1px solid var(--gold);border-radius:10px;text-align:center;">
      <p style="font-family:var(--font-head);font-size:1.4rem;color:var(--ink);margin-bottom:0.5rem;">Own a business in ${escHtml(town)}?</p>
      <p style="font-size:0.85rem;color:var(--muted);margin-bottom:1rem;">Get listed on the Olideen Directory for free. No sign-up, no cost, always live.</p>
      <button class="btn-primary" onclick="openModal()">List My Business Free →</button>
    </div>`;
}

async function loadRelated() {
  const b = currentBiz;
  try {
    const all   = await fetchByTown(b.town);
    const rel   = all.filter(x => x.id != b.id && x.category === b.category).slice(0, 4);
    const other = all.filter(x => x.id != b.id && x.category !== b.category).slice(0, 4);
    const show  = rel.length ? rel : other;

    const sec = document.getElementById('relatedSection');
    if (!sec) return;

    if (!show.length) {
      sec.innerHTML = '';
      return;
    }

    sec.innerHTML = `
      <h2>More Businesses in ${escHtml(normaliseTown(b.town))}</h2>
      ${renderCardsSection(show)}`;
  } catch(e) { /* silent */ }
}

function renderNotFound() {
  document.getElementById('detailWrap').innerHTML = `
    <div class="state-box">
      <div class="state-icon">⊘</div>
      <h3>Business not found</h3>
      <p>This listing may have been removed. <a href="index.html" style="color:var(--gold);">Browse the full directory →</a></p>
    </div>`;
}
</script>
</body>
</html>
