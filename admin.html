<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Hidden Gems SA</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg:        #F5EDE6;
      --surface:   #FFFDFB;
      --surface2:  #FBF4EE;
      --border:    #E7D8CC;
      --border2:   #D8C5B4;
      --gold:      #BC8514;
      --gold-pale: #FAF2E0;
      --gold-light:#E6D2A8;
      --ochre:     #A8730C;
      --ruby:      #3D0A05;
      --ink:       #3D0A05;
      --ink2:      #5C2A1E;
      --muted:     #9A8678;
      --muted2:    #B7A597;
      --success:   #1F7A4A;
      --success-bg:#EDF6F0;
      --danger:    #B5392A;
      --danger-bg: #FBEDEA;
      --warn:      #BC8514;
      --warn-bg:   #FAF2E0;
      --radius:    8px;
      --font-head: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
      --shadow-sm: 0 1px 4px rgba(61,10,5,0.07);
      --shadow-md: 0 4px 16px rgba(61,10,5,0.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      background-image: radial-gradient(rgba(165,133,112,0.10) 1px, transparent 1px);
      background-size: 24px 24px;
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    button { cursor: pointer; font-family: var(--font-body); }

    /* ── LOGIN ──────────────────────────────────────────────── */
    .login-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 44px 40px;
      width: 100%; max-width: 380px;
      box-shadow: 0 30px 70px -34px rgba(61,10,5,0.4);
      text-align: center;
    }
    .login-logo-img { height: 52px; width: auto; margin: 0 auto 20px; display: block; }
    .login-kicker {
      font-family: var(--font-head);
      font-style: italic;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .login-card h2 {
      font-family: var(--font-head);
      font-weight: 600;
      font-size: 30px;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .login-card p { font-size: 13.5px; color: var(--muted); margin-bottom: 26px; }
    .login-field { display: flex; flex-direction: column; gap: 0.35rem; text-align: left; margin-bottom: 1rem; }
    .login-field label { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .login-field input {
      width: 100%; padding: 13px 16px; font-size: 14px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--ink); border-radius: var(--radius);
      text-align: center; letter-spacing: 0.1em;
    }
    .login-field input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(188,133,20,0.12); }
    .btn-login {
      width: 100%; background: var(--gold); color: #FFFDF7; border: none;
      padding: 14px; border-radius: var(--radius);
      font-family: var(--font-head); font-size: 1.1rem; letter-spacing: 0.04em;
      transition: background 0.2s;
    }
    .btn-login:hover { background: var(--ochre); }
    .login-error {
      font-size: 12.5px; color: var(--danger); margin-top: 14px; display: none;
    }

    /* ── ADMIN LAYOUT ───────────────────────────────────────── */
    .admin-wrap { display: none; flex-direction: column; min-height: 100vh; }
    .admin-wrap.show { display: flex; }

    .admin-topbar {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 12px 2rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 6px 24px -18px rgba(61,10,5,0.3);
    }
    .admin-logo { display: flex; align-items: center; gap: 12px; }
    .admin-logo-img { height: 40px; width: auto; display: block; }
    .admin-badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      background: var(--danger-bg); color: var(--danger);
      border: 1px solid var(--danger); padding: 3px 9px; border-radius: var(--radius);
    }
    .admin-topbar-right { display: flex; align-items: center; gap: 0.75rem; }
    .btn-topbar {
      font-size: 12px; color: var(--muted);
      border: 1px solid var(--border2); background: transparent;
      padding: 6px 14px; border-radius: 100px; transition: all 0.15s;
    }
    .btn-topbar:hover { color: var(--ink); border-color: var(--gold); }

    .admin-main { flex: 1; padding: 2rem; max-width: 1100px; margin: 0 auto; width: 100%; }

    /* ── STATS ──────────────────────────────────────────────── */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 14px; margin-bottom: 2rem; }
    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: var(--shadow-sm);
    }
    .stat-pill .num { font-family: var(--font-head); font-size: 34px; font-weight: 600; line-height: 1; }
    .stat-pill .lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-top: 8px; }
    .stat-pill.pending .num  { color: var(--warn); }
    .stat-pill.approved .num { color: var(--success); }
    .stat-pill.rejected .num { color: var(--danger); }

    /* ── TABS ───────────────────────────────────────────────── */
    .tab-bar { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab-btn {
      padding: 11px 18px; border: none; background: transparent;
      font-size: 12.5px; font-weight: 600; letter-spacing: 0.04em;
      color: var(--muted); border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: all 0.15s; cursor: pointer;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active { color: var(--ochre); border-bottom-color: var(--gold); }

    /* ── SUBMISSION CARDS ───────────────────────────────────── */
    .submissions-list { display: flex; flex-direction: column; gap: 16px; }
    .sub-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.15s;
    }
    .sub-card:hover { box-shadow: var(--shadow-md); }
    .sub-card.status-pending  { border-left: 4px solid var(--warn); }
    .sub-card.status-approved { border-left: 4px solid var(--success); }
    .sub-card.status-rejected { border-left: 4px solid var(--danger); opacity: 0.78; }

    .sub-card-header {
      padding: 20px 22px;
      display: flex; align-items: center; gap: 16px;
      cursor: pointer; user-select: none;
    }
    .sub-initial {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--gold-pale);
      border: 1px solid var(--gold-light);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head); font-style: italic;
      font-size: 20px; color: var(--gold); flex-shrink: 0;
    }
    .sub-biz-name { font-family: var(--font-head); font-size: 19px; font-weight: 600; color: var(--ink); line-height: 1.2; }
    .sub-meta { display: flex; align-items: center; gap: 10px; margin-top: 4px; font-size: 12px; color: var(--muted); }
    .status-badge {
      flex-shrink: 0;
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 5px 12px; border-radius: 100px; border: 1px solid;
    }
    .status-badge.pending  { background: var(--warn-bg);    color: var(--warn);    border-color: var(--gold-light); }
    .status-badge.approved { background: var(--success-bg); color: var(--success); border-color: rgba(31,122,74,0.4); }
    .status-badge.rejected { background: var(--danger-bg);  color: var(--danger);  border-color: rgba(181,57,42,0.4); }
    .expand-icon { color: var(--muted2); font-size: 0.8rem; transition: transform 0.2s; flex-shrink: 0; }
    .sub-card.expanded .expand-icon { transform: rotate(180deg); }

    .sub-card-body {
      border-top: 1px solid var(--border);
      padding: 22px;
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .sub-card.expanded .sub-card-body { display: grid; }

    .detail-block { display: flex; flex-direction: column; gap: 0.25rem; }
    .detail-block.full { grid-column: 1 / -1; }
    .detail-label { font-size: 10.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    .detail-value { font-size: 13.5px; color: var(--ink2); line-height: 1.55; }

    .review-detail-box {
      grid-column: 1 / -1;
      background: var(--gold-pale);
      border: 1px solid var(--gold-light);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .review-detail-box .detail-label { color: var(--ochre); }
    .review-detail-box .detail-value { font-size: 14.5px; line-height: 1.6; color: var(--ink); }

    .sub-actions {
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 12px;
      padding-top: 8px; border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .btn-approve {
      background: var(--success); color: #fff; border: none;
      padding: 11px 24px; border-radius: 100px;
      font-size: 13px; font-weight: 600; letter-spacing: 0.02em;
      transition: all 0.2s;
    }
    .btn-approve:hover { background: #155f39; }
    .btn-approve:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-reject {
      background: transparent; color: var(--danger);
      border: 1px solid rgba(181,57,42,0.4);
      padding: 11px 20px; border-radius: 100px;
      font-size: 13px; font-weight: 600; letter-spacing: 0.02em;
      transition: all 0.2s;
    }
    .btn-reject:hover { background: var(--danger); color: #fff; }
    .btn-reject:disabled { opacity: 0.5; cursor: not-allowed; }
    .note-input {
      flex: 1; min-width: 180px;
      padding: 10px 14px; font-size: 13px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--ink); border-radius: var(--radius);
    }
    .note-input:focus { outline: none; border-color: var(--gold); }
    .note-hint { font-size: 11px; color: var(--muted2); align-self: center; }

    .inline-link {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; padding: 4px 10px; border-radius: 100px;
      border: 1px solid; text-decoration: none;
    }
    .inline-link.wa  { border-color: #25a244; color: #25a244; background: rgba(37,162,68,0.06); }
    .inline-link.web { border-color: #1a6fa0; color: #1a6fa0; background: rgba(26,111,160,0.06); }

    .empty-state { text-align: center; padding: 70px 20px; }
    .empty-icon  { font-family: var(--font-head); font-style: italic; font-size: 28px; color: var(--gold); margin-bottom: 8px; }
    .empty-state h3 { font-family: var(--font-head); font-size: 1.5rem; color: var(--ink2); margin-bottom: 4px; }
    .empty-state p  { font-size: 13.5px; color: var(--muted); }
    .spinner { display: inline-block; width: 26px; height: 26px; border: 2px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 8px; padding: 0.7rem 1.2rem; font-size: 0.83rem;
      color: var(--ink2); z-index: 200; opacity: 0; transition: all 0.3s ease;
      white-space: nowrap; box-shadow: var(--shadow-md);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.ok  { border-color: var(--success); }
    .toast.err { border-color: var(--danger); }

    @media (max-width: 640px) {
      .sub-card-body { grid-template-columns: 1fr; }
      .detail-block.full, .review-detail-box, .sub-actions { grid-column: 1; }
      .admin-main { padding: 1rem; }
      .admin-topbar { padding: 12px 1rem; }
    }
  </style>
</head>
<body>

<!-- ══ LOGIN ════════════════════════════════════════════════════════ -->
<div class="login-wrap" id="loginScreen">
  <div class="login-card">
    <img src="Hidden_Gems_SA_Logo.png" alt="Hidden Gems SA" class="login-logo-img" />
    <div class="login-kicker">Hidden Gems SA</div>
    <h2>Review Portal</h2>
    <p>Enter your admin password to review pending listings.</p>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="pwInput" placeholder="••••••••" />
    </div>
    <button class="btn-login" onclick="doLogin()">Sign In →</button>
    <p class="login-error" id="loginError">Incorrect password. Please try again.</p>
  </div>
</div>

<!-- ══ ADMIN PANEL ════════════════════════════════════════════════ -->
<div class="admin-wrap" id="adminWrap">

  <div class="admin-topbar">
    <div class="admin-logo">
      <img src="Hidden_Gems_SA_Logo.png" alt="Hidden Gems SA" class="admin-logo-img" />
      <span class="admin-badge">Admin</span>
    </div>
    <div class="admin-topbar-right">
      <span style="font-size:11px;color:var(--muted);" id="lastRefresh"></span>
      <button class="btn-topbar" onclick="refresh()">↻ Refresh</button>
      <button class="btn-topbar" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="admin-main">

    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:30px;">
      <div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
          <span style="display:block;width:28px;height:1px;background:var(--gold);"></span>
          <span style="font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);">Review Portal</span>
        </div>
        <h1 style="font-family:var(--font-head);font-weight:600;font-size:clamp(1.8rem,4vw,2.6rem);color:var(--ink);line-height:1;">Business Submissions</h1>
        <p style="font-size:0.83rem;color:var(--muted);margin-top:6px;">Review pending listings before they go live on Hidden Gems SA.</p>
      </div>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-pill pending"><span class="num" id="sPending">—</span><div class="lbl">Pending</div></div>
      <div class="stat-pill approved"><span class="num" id="sApproved">—</span><div class="lbl">Approved</div></div>
      <div class="stat-pill rejected"><span class="num" id="sRejected">—</span><div class="lbl">Rejected</div></div>
      <div class="stat-pill"><span class="num" id="sTotal">—</span><div class="lbl">Total</div></div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="pending"  onclick="setTab('pending')">⏳ Pending</button>
      <button class="tab-btn"        data-tab="approved" onclick="setTab('approved')">✓ Approved</button>
      <button class="tab-btn"        data-tab="rejected" onclick="setTab('rejected')">✕ Rejected</button>
      <button class="tab-btn"        data-tab="all"      onclick="setTab('all')">All</button>
    </div>

    <div class="submissions-list" id="submissionsList">
      <div class="empty-state"><div class="spinner"></div></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── Config ────────────────────────────────────────────────── */
const SUPABASE_URL         = 'https://uwxanvllgomcpjtotowd.supabase.co';
const SUPABASE_SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eGFudmxsZ29tY3BqdG90b3dkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDA4MzQ1MywiZXhwIjoyMDk1NjU5NDUzfQ.ysXV6yCVUmx9WLNm_wEV07VURRi8i-kP0NhWmChVL3k';
const ADMIN_PASSWORD       = 'GWJSLO@786';
const SESSION_KEY          = 'hg_admin_auth';

/* ── Auth ──────────────────────────────────────────────────── */
function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminWrap').classList.add('show');
    initAdmin();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
}

/* ── Supabase (service role) ───────────────────────────────── */
let _sb;
function initAdmin() {
  _sb = supabase.createClient(SUPABASE_URL, SUPABASE_SERVICE_KEY);
  loadSubmissions();
}

/* ── State ─────────────────────────────────────────────────── */
let allSubs   = [];
let activeTab = 'pending';

/* ── Load ──────────────────────────────────────────────────── */
async function loadSubmissions() {
  document.getElementById('submissionsList').innerHTML =
    '<div class="empty-state"><div class="spinner"></div></div>';
  try {
    const { data, error } = await _sb
      .from('businesses')
      .select('id,name,category,town,whatsapp,website,description,business_detail,owner_name,owner_phone,owner_email,status,review_note,created_at')
      .order('created_at', { ascending: false });
    if (error) throw error;
    allSubs = data || [];
    updateStats();
    renderList();
    document.getElementById('lastRefresh').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    console.error(e);
    document.getElementById('submissionsList').innerHTML =
      '<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Load failed</h3><p>Check your service role key.</p></div>';
  }
}
async function refresh() { await loadSubmissions(); }

/* ── Stats ─────────────────────────────────────────────────── */
function updateStats() {
  const count = s => allSubs.filter(b => b.status === s).length;
  document.getElementById('sPending').textContent  = count('pending');
  document.getElementById('sApproved').textContent = count('approved');
  document.getElementById('sRejected').textContent = count('rejected');
  document.getElementById('sTotal').textContent    = allSubs.length;
}

/* ── Tabs ──────────────────────────────────────────────────── */
function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  renderList();
}
function getVisible() {
  return activeTab === 'all' ? allSubs : allSubs.filter(b => b.status === activeTab);
}

/* ── Render ────────────────────────────────────────────────── */
function renderList() {
  const list = getVisible();
  const el   = document.getElementById('submissionsList');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${activeTab === 'pending' ? 'All clear.' : 'Nothing here.'}</div>
      <h3>${activeTab === 'pending' ? 'All clear!' : 'Nothing here'}</h3>
      <p>No ${activeTab === 'all' ? 'submissions' : activeTab + ' submissions'} yet.</p>
    </div>`;
    return;
  }
  el.innerHTML = list.map(b => renderCard(b)).join('');
}

function renderCard(b) {
  const created    = new Date(b.created_at).toLocaleDateString('en-ZA', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const waContact  = b.owner_phone
    ? `<a href="https://wa.me/${b.owner_phone.replace(/\D/g,'')}" target="_blank" class="inline-link wa">💬 ${esc(b.owner_phone)}</a>` : '';
  const emailContact = b.owner_email
    ? `<a href="mailto:${esc(b.owner_email)}" class="inline-link web">✉ ${esc(b.owner_email)}</a>` : '';

  return `
  <div class="sub-card status-${b.status}" id="card-${b.id}">
    <div class="sub-card-header" onclick="toggleCard(${b.id})">
      <div class="sub-initial">${b.name ? b.name.charAt(0).toUpperCase() : '?'}</div>
      <div style="flex:1;min-width:0;">
        <div class="sub-biz-name">${esc(b.name)}</div>
        <div class="sub-meta">
          <span>&#9679; ${esc(b.town)}</span>
          <span>&middot;</span>
          <span>${esc(b.category)}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
        <span style="font-size:11px;color:var(--muted2);">${created}</span>
        <span class="status-badge ${b.status}">${b.status}</span>
        <span class="expand-icon">▾</span>
      </div>
    </div>

    <div class="sub-card-body">

      <div class="review-detail-box">
        <div class="detail-label">📋 What they say their business does</div>
        <div class="detail-value" style="margin-top:6px;">${esc(b.business_detail) || '<em style="color:var(--muted)">Not provided</em>'}</div>
      </div>

      <div class="detail-block">
        <div class="detail-label">Public Description</div>
        <div class="detail-value">${esc(b.description) || '<em style="color:var(--muted2)">None</em>'}</div>
      </div>
      <div class="detail-block">
        <div class="detail-label">Public Links</div>
        <div class="detail-value" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">
          ${b.whatsapp ? `<a href="https://wa.me/${b.whatsapp.replace(/\D/g,'')}" target="_blank" class="inline-link wa">💬 ${esc(b.whatsapp)}</a>` : ''}
          ${b.website  ? `<a href="${esc(b.website)}" target="_blank" class="inline-link web">↗ ${esc(b.website.replace(/^https?:\/\//,''))}</a>` : ''}
          ${!b.whatsapp && !b.website ? '<span style="color:var(--muted2);font-size:0.8rem;">No links provided</span>' : ''}
        </div>
      </div>

      <div class="detail-block">
        <div class="detail-label">🔒 Owner Name (private)</div>
        <div class="detail-value">${esc(b.owner_name) || '—'}</div>
      </div>
      <div class="detail-block">
        <div class="detail-label">🔒 Owner Contact (private)</div>
        <div class="detail-value" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">
          ${waContact}${emailContact}
          ${!b.owner_phone && !b.owner_email ? '<span style="color:var(--muted2);">None provided</span>' : ''}
        </div>
      </div>

      ${b.review_note ? `<div class="detail-block full">
        <div class="detail-label">Previous Note</div>
        <div class="detail-value" style="font-style:italic;color:var(--muted);">"${esc(b.review_note)}"</div>
      </div>` : ''}

      ${b.status === 'pending' ? `
      <div class="sub-actions">
        <button class="btn-approve" onclick="approve(${b.id},event)">✓ Approve &amp; publish</button>
        <input type="text" class="note-input" id="note-${b.id}" placeholder="Optional: reason for rejection…" maxlength="200" />
        <button class="btn-reject" onclick="reject(${b.id},event)">✕ Reject</button>
        <span class="note-hint">Note is shown to the owner on rejection.</span>
      </div>` : `
      <div class="sub-actions">
        <span style="font-size:12.5px;color:var(--muted);">
          Status: <strong>${b.status}</strong>${b.review_note ? ` — "${esc(b.review_note)}"` : ''}</span>
        ${b.status === 'rejected'  ? `<button class="btn-approve" style="margin-left:auto;" onclick="approve(${b.id},event)">↩ Re-approve</button>` : ''}
        ${b.status === 'approved'  ? `<button class="btn-reject"  style="margin-left:auto;" onclick="reject(${b.id},event)">✕ Remove</button>` : ''}
      </div>`}

    </div>
  </div>`;
}

/* ── Toggle expand ─────────────────────────────────────────── */
function toggleCard(id) {
  document.getElementById('card-' + id).classList.toggle('expanded');
}

/* ── Approve ───────────────────────────────────────────────── */
async function approve(id, e) {
  e.stopPropagation();
  const card = document.getElementById('card-' + id);
  const btns = card.querySelectorAll('.btn-approve,.btn-reject');
  btns.forEach(b => b.disabled = true);
  try {
    const { error } = await _sb.from('businesses').update({ status:'approved', review_note:null }).eq('id', id);
    if (error) throw error;
    const sub = allSubs.find(b => b.id === id);
    if (sub) sub.status = 'approved';
    updateStats(); renderList();
    toast('✓ Approved — listing is now live','ok');
  } catch(err) {
    console.error(err);
    toast('❌ Update failed — check Supabase connection','err');
    btns.forEach(b => b.disabled = false);
  }
}

/* ── Reject ────────────────────────────────────────────────── */
async function reject(id, e) {
  e.stopPropagation();
  const card = document.getElementById('card-' + id);
  const note = document.getElementById('note-' + id)?.value.trim() || '';
  const btns = card.querySelectorAll('.btn-approve,.btn-reject');
  btns.forEach(b => b.disabled = true);
  try {
    const { error } = await _sb.from('businesses').update({ status:'rejected', review_note:note||null }).eq('id', id);
    if (error) throw error;
    const sub = allSubs.find(b => b.id === id);
    if (sub) { sub.status = 'rejected'; sub.review_note = note || null; }
    updateStats(); renderList();
    toast('✕ Listing rejected','ok');
  } catch(err) {
    console.error(err);
    toast('❌ Update failed','err');
    btns.forEach(b => b.disabled = false);
  }
}

/* ── Helpers ───────────────────────────────────────────────── */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _tt;
function toast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), 3500);
}

/* ── Boot ──────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminWrap').classList.add('show');
    initAdmin();
  } else {
    document.getElementById('pwInput').focus();
  }
  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});
</script>
</body>
</html>
