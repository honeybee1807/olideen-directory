<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse by Category — Hidden Gems SA</title>
  <meta name="description" content="Browse local businesses in KwaZulu-Natal by category. Find tech businesses, restaurants, salons, tutors, retailers and more on Hidden Gems SA." />
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />
  <meta name="geo.region" content="ZA-KZN" />
  <meta name="geo.placename" content="KwaZulu-Natal, South Africa" />
  <link rel="canonical" href="https://directory.olideentech.co.za/categories.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
<div class="page-wrap">
  <div id="nav-placeholder"></div>

  <nav class="breadcrumb" aria-label="Breadcrumb">
    <div class="breadcrumb-inner">
      <a href="index.html">Directory</a>
      <span class="sep">›</span>
      <span class="current" id="bcLabel">Categories</span>
    </div>
  </nav>

  <header class="hero hero-page" role="banner">
    <div class="hero-inner">
      <div>
        <p class="hero-kicker" id="heroKicker">Category Directory &middot; KwaZulu-Natal</p>
        <h1 id="heroTitle">Browse by <span class="accent">Category.</span></h1>
        <p class="hero-sub" id="heroSub">Find local businesses across KZN by the type of service they offer.</p>
        <div class="hero-stats">
          <div><span class="stat-num" id="statCount">—</span><span class="stat-label">Businesses</span></div>
          <div><span class="stat-num" id="statTowns">—</span><span class="stat-label">Towns</span></div>
        </div>
      </div>
      <div class="hero-cta-block">
        <button class="btn-primary" onclick="openModal()">+ List My Business <span class="arrow">→</span></button>
        <span class="free-note">✓ Always free</span>
      </div>
    </div>
  </header>

  <!-- Search (shown only on single-category view) -->
  <div class="search-bar-wrap" id="searchBarWrap" style="display:none;">
    <div class="search-bar-inner" style="max-width:760px;margin:0 auto;">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" class="search-input"
        placeholder="Search within this category…"
        oninput="renderCategoryPage()" />
    </div>
  </div>

  <!-- Filter bar (single-category view) -->
  <div class="filter-bar" id="filterBarWrap" style="display:none;">
    <div class="filter-bar-inner">
      <div class="filter-tabs" id="townFilterTabs">
        <button class="filter-tab active" data-town="All" onclick="setTownFilter('All')">All Towns</button>
      </div>
      <div class="controls-right">
        <span class="total-count">Showing <span id="visibleCount">—</span></span>
        <div class="view-toggle">
          <button class="view-btn active" id="tableViewBtn" onclick="setView('table')">☰ List</button>
          <button class="view-btn"        id="cardViewBtn"  onclick="setView('cards')">⊞ Grid</button>
        </div>
      </div>
    </div>
  </div>

  <main role="main" id="mainContent" style="padding:2rem var(--pad-x) 5rem;max-width:var(--max-w);margin:0 auto;width:100%;">
    <div style="text-align:center;padding:4rem;"><div class="spinner"></div></div>
  </main>

  <section class="seo-block" id="seoBlock"></section>

  <div id="footer-placeholder"></div>
</div>
<div id="modal-placeholder"></div>

</body>
</html>
